<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Roulette</title>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f8f6;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .scene {
      width: 360px;
      aspect-ratio: 16/9;
      perspective: 1000px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      overflow: hidden;
    }

    .face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .back {
      transform: rotateY(180deg);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: black;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <button onclick="spin()">Spin</button>

    <div class="scene" id="scene">
      <div class="card" id="card">
        <div class="face front">
          <img id="frontImg" src="">
        </div>
        <div class="face back">
          <img id="backImg" src="">
        </div>
      </div>
    </div>
  </div>

  <script>
    const cards = [
      {
        front: "https://github.com/awsaf-ed/eid/blob/main/1.jpg?raw=true",
        back: "https://github.com/awsaf-ed/eid/blob/main/2.jpg?raw=true"
      },
      {
        front: "https://github.com/awsaf-ed/eid/blob/main/1.jpg?raw=true",
        back: "https://github.com/awsaf-ed/eid/blob/main/3.jpg?raw=true"
      },
      {
        front: "https://github.com/awsaf-ed/eid/blob/main/1.jpg?raw=true",
        back: "https://github.com/awsaf-ed/eid/blob/main/4.jpg?raw=true"
      },
      {
        front: "https://github.com/awsaf-ed/eid/blob/main/1.jpg?raw=true",
        back: "https://github.com/awsaf-ed/eid/blob/main/5.jpg?raw=true"
      }
    ];

    const frontImg = document.getElementById("frontImg");
    const backImg = document.getElementById("backImg");
    const card = document.getElementById("card");

    let flipped = false;

    function spin() {
      const random = cards[Math.floor(Math.random() * cards.length)];

      frontImg.src = random.front;
      backImg.src = random.back;

      card.classList.remove("flipped");
      flipped = false;
    }

    // ✅ FIXED: Only ONE event (no double trigger)
    document.getElementById("scene").addEventListener("click", () => {
      flipped = !flipped;
      card.classList.toggle("flipped", flipped);
    });
  </script>
</body>
</html>
